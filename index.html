<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=/dashboard/" />
    <title>INTELIGÊNCIA TERRITORIAL ESTRATÉGICA - CONECT</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe6;
        --ink: #142126;
        --muted: #5b6b74;
        --forest: #123f38;
        --teal: #2d6f68;
        --gold: #c28a2d;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, rgba(194, 138, 45, 0.2), transparent 34%),
          radial-gradient(circle at 85% 15%, rgba(18, 63, 56, 0.18), transparent 28%),
          linear-gradient(180deg, var(--bg) 0%, #f8f4ec 100%);
        color: var(--ink);
        font-family: "Avenir Next", "Segoe UI", "Trebuchet MS", sans-serif;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        text-align: center;
      }

      .card {
        max-width: 720px;
        padding: 34px 28px;
        border-radius: 28px;
        background: rgba(255, 251, 244, 0.82);
        border: 1px solid rgba(20, 33, 38, 0.12);
        box-shadow: 0 24px 60px rgba(20, 33, 38, 0.14);
        backdrop-filter: blur(18px);
      }

      h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2rem, 4vw, 3.6rem);
        line-height: 0.98;
        letter-spacing: -0.05em;
        text-transform: uppercase;
        color: var(--forest);
      }

      .sub {
        margin: 12px 0 0;
        text-transform: uppercase;
        letter-spacing: 0.22em;
        color: var(--muted);
        font-weight: 700;
        font-size: 0.9rem;
      }

      .hint {
        margin: 18px 0 0;
        color: var(--muted);
        line-height: 1.6;
      }

      a {
        color: var(--teal);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card" aria-label="Redirecionamento para o dashboard">
        <h1>INTELIGÊNCIA TERRITORIAL ESTRATÉGICA</h1>
        <p class="sub">CONECT</p>
        <p class="hint">
          Se o redirecionamento não ocorrer automaticamente, acesse
          <a href="/dashboard/">o dashboard</a>.
        </p>
      </section>
    </main>
  </body>
</html>
